<!DOCTYPE html>
<html>
<head>
<title>Alumni Registration - Validation</title>

<style>

body{
font-family: Arial;
background:#eef2f7;
}

.container{
width:420px;
margin:auto;
margin-top:50px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 0px 12px gray;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.error{
color:red;
font-size:14px;
}

.success{
color:green;
text-align:center;
margin-top:10px;
}

</style>

<script>

function validateForm(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let phone=document.getElementById("phone").value.trim();
let company=document.getElementById("company").value.trim();
let batch=document.getElementById("batch").value;

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

document.getElementById("errorName").innerHTML="";
document.getElementById("errorEmail").innerHTML="";
document.getElementById("errorPhone").innerHTML="";
document.getElementById("errorCompany").innerHTML="";
document.getElementById("errorBatch").innerHTML="";
document.getElementById("successMsg").innerHTML="";

let valid=true;

if(name==""){
document.getElementById("errorName").innerHTML="Name cannot be empty";
valid=false;
}

if(email==""){
document.getElementById("errorEmail").innerHTML="Email cannot be empty";
valid=false;
}
else if(!email.match(emailPattern)){
document.getElementById("errorEmail").innerHTML="Enter valid email address";
valid=false;
}

if(phone==""){
document.getElementById("errorPhone").innerHTML="Phone number required";
valid=false;
}
else if(phone.length!=10 || isNaN(phone)){
document.getElementById("errorPhone").innerHTML="Enter valid 10 digit phone number";
valid=false;
}

if(company==""){
document.getElementById("errorCompany").innerHTML="Company name required";
valid=false;
}

if(batch==""){
document.getElementById("errorBatch").innerHTML="Please select batch year";
valid=false;
}

if(valid){
document.getElementById("successMsg").innerHTML="Registration Successful!";
}

return false;

}

</script>

</head>

<body>

<div class="container">

<h2>Alumni Registration Form</h2>

<form onsubmit="return validateForm()">

<label>Name</label>
<input type="text" id="name">
<div class="error" id="errorName"></div>

<label>Email</label>
<input type="text" id="email">
<div class="error" id="errorEmail"></div>

<label>Phone Number</label>
<input type="text" id="phone">
<div class="error" id="errorPhone"></div>

<label>Organization / Company</label>
<input type="text" id="company">
<div class="error" id="errorCompany"></div>

<label>Batch Year</label>
<select id="batch">
<option value="">Select Batch</option>
<option>2015</option>
<option>2016</option>
<option>2017</option>
<option>2018</option>
<option>2019</option>
<option>2020</option>
</select>
<div class="error" id="errorBatch"></div>

<br>

<button type="submit">Register</button>

</form>

<div class="success" id="successMsg"></div>

</div>

</body>
</html>
