
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni Directory - Dynamic DOM</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f7;
margin:0;
padding:0;
}

.container{
width:600px;
margin:auto;
margin-top:40px;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
}

input{
width:100%;
padding:8px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0056b3;
}

.alumniCard{
border-bottom:1px solid #ddd;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Alumni Directory</h2>

<h3>Add Alumni</h3>

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="batch" placeholder="Enter Batch Year">
<input type="text" id="role" placeholder="Enter Job Role">
<input type="text" id="company" placeholder="Enter Company">

<button onclick="addAlumni()">Add Alumni</button>

<h3>Alumni List</h3>

<div id="alumniList"></div>

</div>

<script>

function addAlumni(){

let name=document.getElementById("name").value;
let batch=document.getElementById("batch").value;
let role=document.getElementById("role").value;
let company=document.getElementById("company").value;

if(name=="" || batch=="" || role=="" || company==""){
alert("Please fill all fields");
return;
}

let alumniContainer=document.getElementById("alumniList");

let card=document.createElement("div");

card.className="alumniCard";

card.innerHTML=
"<b>Name:</b> "+name+"<br>"+
"<b>Batch:</b> "+batch+"<br>"+
"<b>Role:</b> "+role+"<br>"+
"<b>Company:</b> "+company;

alumniContainer.appendChild(card);

document.getElementById("name").value="";
document.getElementById("batch").value="";
document.getElementById("role").value="";
document.getElementById("company").value="";

}

</script>

</body>
</html>
